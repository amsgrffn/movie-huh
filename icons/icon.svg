<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#0051d5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Film clapperboard -->
  <g fill="#ffffff">
    <!-- Clapper top (striped part) -->
    <rect x="80" y="100" width="352" height="60" rx="8" fill="#1d1d1f"/>
    <rect x="80" y="100" width="50" height="60" fill="#ffffff"/>
    <rect x="160" y="100" width="50" height="60" fill="#ffffff"/>
    <rect x="240" y="100" width="50" height="60" fill="#ffffff"/>
    <rect x="320" y="100" width="50" height="60" fill="#ffffff"/>
    <rect x="400" y="100" width="32" height="60" rx="0 8 8 0" fill="#ffffff"/>
    <!-- Main board -->
    <rect x="80" y="160" width="352" height="252" rx="8" fill="#ffffff"/>
    <!-- Text lines on board -->
    <rect x="110" y="200" width="200" height="16" rx="4" fill="#e5e5e5"/>
    <rect x="110" y="240" width="280" height="16" rx="4" fill="#e5e5e5"/>
    <rect x="110" y="280" width="160" height="16" rx="4" fill="#e5e5e5"/>
    <rect x="110" y="320" width="240" height="16" rx="4" fill="#e5e5e5"/>
    <rect x="110" y="360" width="180" height="16" rx="4" fill="#e5e5e5"/>
  </g>
  <!-- Film emoji accent -->
  <text x="350" y="340" font-size="80" font-family="Apple Color Emoji, Segoe UI Emoji">🎬</text>
</svg>
